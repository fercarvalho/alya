# Dependabot configuration for automated dependency updates
# See: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Frontend dependencies (root package.json)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    reviewers:
      - "fernandocarvalho"
    assignees:
      - "fernandocarvalho"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Agrupar dependências por tipo
    groups:
      react-dependencies:
        patterns:
          - "react*"
          - "@types/react*"
      build-dependencies:
        patterns:
          - "vite*"
          - "@vitejs/*"
          - "typescript"
      testing-dependencies:
        patterns:
          - "vitest*"
          - "@testing-library/*"
          - "jest*"
    # Ignorar atualizações major de dependências específicas (breaking changes)
    ignore:
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

  # Backend dependencies (server/package.json)
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "America/Sao_Paulo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
      - "security"
    reviewers:
      - "fernandocarvalho"
    assignees:
      - "fernandocarvalho"
    commit-message:
      prefix: "deps(server)"
      include: "scope"
    # Agrupar dependências por tipo
    groups:
      security-dependencies:
        patterns:
          - "helmet"
          - "express-rate-limit"
          - "express-validator"
          - "bcryptjs"
          - "jsonwebtoken"
          - "*sanitize*"
          - "xss-clean"
      database-dependencies:
        patterns:
          - "pg"
          - "pg-*"
    # Ignorar xlsx (tem vulnerabilidade conhecida, migração planejada)
    ignore:
      - dependency-name: "xlsx"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  # GitHub Actions (se houver workflows)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
