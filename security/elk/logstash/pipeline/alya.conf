# ═══════════════════════════════════════════════════════════════════════════════
# Logstash Pipeline - Alya Financial System
# ═══════════════════════════════════════════════════════════════════════════════

# ═════════════════════════════════════════════════════════════════════════════
# INPUT - De onde vêm os logs
# ═════════════════════════════════════════════════════════════════════════════

input {
  # Logs da aplicação Node.js (via TCP/JSON)
  tcp {
    port => 5000
    codec => json
    tags => ["application"]
  }

  # Logs do Nginx (access log)
  file {
    path => "/var/log/nginx/alya-access.log"
    start_position => "beginning"
    tags => ["nginx", "access"]
    codec => plain
  }

  # Logs do Nginx (error log)
  file {
    path => "/var/log/nginx/alya-error.log"
    start_position => "beginning"
    tags => ["nginx", "error"]
    codec => plain
  }

  # Logs do ModSecurity (audit log)
  file {
    path => "/var/log/nginx/modsec-audit.log"
    start_position => "beginning"
    tags => ["modsecurity", "security"]
    codec => plain
  }

  # Logs da aplicação (arquivo)
  file {
    path => "/var/log/alya/*.log"
    start_position => "beginning"
    tags => ["application", "file"]
    codec => json
  }
}

# ═════════════════════════════════════════════════════════════════════════════
# FILTER - Processamento e enriquecimento de logs
# ═════════════════════════════════════════════════════════════════════════════

filter {
  # ───────────────────────────────────────────────────────────────────────────
  # Nginx Access Logs
  # ───────────────────────────────────────────────────────────────────────────
  if "nginx" in [tags] and "access" in [tags] {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:http_method} %{DATA:url} HTTP/%{NUMBER:http_version}" %{NUMBER:status_code} %{NUMBER:bytes_sent} "%{DATA:referrer}" "%{DATA:user_agent}"'
      }
    }

    # Parse timestamp
    date {
      match => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target => "@timestamp"
    }

    # Parse user agent
    useragent {
      source => "user_agent"
      target => "user_agent_parsed"
    }

    # GeoIP (requer GeoIP database)
    # geoip {
    #   source => "client_ip"
    #   target => "geoip"
    # }

    # Adicionar campos úteis
    mutate {
      add_field => {
        "log_type" => "nginx_access"
        "service" => "nginx"
      }
      convert => {
        "status_code" => "integer"
        "bytes_sent" => "integer"
      }
    }
  }

  # ───────────────────────────────────────────────────────────────────────────
  # Nginx Error Logs
  # ───────────────────────────────────────────────────────────────────────────
  if "nginx" in [tags] and "error" in [tags] {
    grok {
      match => {
        "message" => '%{DATESTAMP:timestamp} \[%{LOGLEVEL:log_level}\] %{GREEDYDATA:error_message}'
      }
    }

    mutate {
      add_field => {
        "log_type" => "nginx_error"
        "service" => "nginx"
      }
    }
  }

  # ───────────────────────────────────────────────────────────────────────────
  # ModSecurity Audit Logs
  # ───────────────────────────────────────────────────────────────────────────
  if "modsecurity" in [tags] {
    # ModSecurity logs são complexos, parser básico
    grok {
      match => {
        "message" => '\[%{TIMESTAMP_ISO8601:timestamp}\] %{GREEDYDATA:audit_message}'
      }
    }

    mutate {
      add_field => {
        "log_type" => "modsecurity_audit"
        "service" => "modsecurity"
        "severity" => "high"
      }
    }
  }

  # ───────────────────────────────────────────────────────────────────────────
  # Application Logs (JSON)
  # ───────────────────────────────────────────────────────────────────────────
  if "application" in [tags] {
    # Se já é JSON, parse direto
    if [message] =~ /^\{/ {
      json {
        source => "message"
      }
    }

    mutate {
      add_field => {
        "log_type" => "application"
        "service" => "alya"
      }
    }

    # Enriquecer logs de audit
    if [action] {
      mutate {
        add_field => { "is_audit_log" => "true" }
      }

      # Classificar severidade baseado na ação
      if [action] =~ /fail/ {
        mutate { add_field => { "severity" => "high" } }
      } else if [action] =~ /login/ {
        mutate { add_field => { "severity" => "medium" } }
      } else {
        mutate { add_field => { "severity" => "low" } }
      }
    }
  }

  # ───────────────────────────────────────────────────────────────────────────
  # Campos Comuns
  # ───────────────────────────────────────────────────────────────────────────

  # Adicionar hostname
  mutate {
    add_field => {
      "hostname" => "%{HOSTNAME}"
      "environment" => "development"  # Mudar para staging/production
    }
  }

  # Remover campos desnecessários
  mutate {
    remove_field => ["host", "path"]
  }
}

# ═════════════════════════════════════════════════════════════════════════════
# OUTPUT - Para onde vão os logs processados
# ═════════════════════════════════════════════════════════════════════════════

output {
  # Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "alya-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Debug (comentar em produção)
  # stdout {
  #   codec => rubydebug
  # }
}

# ═══════════════════════════════════════════════════════════════════════════════
# NOTAS
# ═══════════════════════════════════════════════════════════════════════════════
#
# 1. ÍNDICES:
#    - alya-logs-YYYY.MM.dd (diário, auto-rollover)
#    - Configurar ILM (Index Lifecycle Management) para:
#      - Hot: últimos 7 dias
#      - Warm: 7-30 dias
#      - Cold: 30-90 dias
#      - Delete: > 90 dias
#
# 2. GROK PATTERNS:
#    - Testar em: https://grokdebug.herokuapp.com/
#    - Criar patterns customizados em: logstash/patterns/
#
# 3. PERFORMANCE:
#    - Batch size: Ajustar conforme volume
#    - Workers: Ajustar conforme CPU
#    - Pipeline: Usar multiple pipelines para tipos diferentes
#
# 4. FILTROS ÚTEIS:
#    - drop: Descartar logs não importantes
#    - fingerprint: Deduplicação
#    - throttle: Rate limiting
#
# ═══════════════════════════════════════════════════════════════════════════════
