# ═══════════════════════════════════════════════════════════════════════════════
# Nginx + ModSecurity Configuration - Alya Financial System
# ═══════════════════════════════════════════════════════════════════════════════
#
# Este arquivo configura Nginx como reverse proxy com ModSecurity WAF
# para proteger a aplicação contra ataques comuns (SQLi, XSS, etc.)
#
# Instalação:
#   Ubuntu/Debian:
#     apt-get install nginx libnginx-mod-security2
#
#   macOS:
#     brew install nginx nginx-mod-security
#
# ═══════════════════════════════════════════════════════════════════════════════

# Configuração principal do servidor
upstream backend {
    server localhost:8001;
    keepalive 32;
}

upstream frontend {
    server localhost:5173;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=100r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# ═══════════════════════════════════════════════════════════════════════════════
# SERVIDOR HTTPS (Produção)
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    server_name alya.exemplo.com;

    # SSL Configuration (ajustar paths)
    ssl_certificate /etc/nginx/ssl/alya.crt;
    ssl_certificate_key /etc/nginx/ssl/alya.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS (Force HTTPS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # CSP (Content Security Policy)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;

    # ═══════════════════════════════════════════════════════════════════════════
    # MODSECURITY
    # ═══════════════════════════════════════════════════════════════════════════

    # Habilitar ModSecurity
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsec/main.conf;

    # Logging
    access_log /var/log/nginx/alya-access.log combined;
    error_log /var/log/nginx/alya-error.log warn;
    modsecurity_audit_log /var/log/nginx/modsec-audit.log;

    # ═══════════════════════════════════════════════════════════════════════════
    # RATE LIMITING GLOBAL
    # ═══════════════════════════════════════════════════════════════════════════

    limit_req zone=global_limit burst=20 nodelay;
    limit_conn conn_limit 50;

    # ═══════════════════════════════════════════════════════════════════════════
    # BACKEND API
    # ═══════════════════════════════════════════════════════════════════════════

    location /api/ {
        # Rate limiting para API
        limit_req zone=api_limit burst=20 nodelay;

        # Rate limiting especial para login
        location ~* ^/api/auth/(login|refresh) {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Outras rotas da API
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffer sizes
        proxy_buffer_size 4k;
        proxy_buffers 4 32k;
        proxy_busy_buffers_size 64k;
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # FRONTEND (SPA)
    # ═══════════════════════════════════════════════════════════════════════════

    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Cache para assets estáticos
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            proxy_pass http://frontend;
        }
    }

    # ═══════════════════════════════════════════════════════════════════════════
    # BLOQUEIOS ESPECÍFICOS
    # ═══════════════════════════════════════════════════════════════════════════

    # Bloquear acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(env|git|svn|htaccess|htpasswd)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloquear user agents maliciosos
    if ($http_user_agent ~* (nikto|sqlmap|nmap|nessus|openvas|masscan)) {
        return 403;
    }

    # Health check (sem rate limit)
    location /health {
        access_log off;
        proxy_pass http://backend/health;
    }
}

# ═══════════════════════════════════════════════════════════════════════════════
# REDIRECT HTTP -> HTTPS
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name alya.exemplo.com;

    # Redirecionar tudo para HTTPS
    return 301 https://$server_name$request_uri;
}
