# ═══════════════════════════════════════════════════════════════════════════════
# ModSecurity Main Configuration - Alya Financial System
# ═══════════════════════════════════════════════════════════════════════════════
#
# Este arquivo deve ser colocado em: /etc/nginx/modsec/main.conf
#
# ═══════════════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════════════
# MODO DE OPERAÇÃO
# ═══════════════════════════════════════════════════════════════════════════════

# SecRuleEngine DetectionOnly  # Apenas detecta, não bloqueia (recomendado inicialmente)
SecRuleEngine On               # Bloqueia ataques (produção)

# ═══════════════════════════════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════════════════════════════

SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/nginx/modsec-audit.log

# Formato JSON para logs (melhor para parsing)
# SecAuditLogFormat JSON

# Debug log (desabilitar em produção)
SecDebugLog /var/log/nginx/modsec-debug.log
SecDebugLogLevel 0  # 0=desabilitado, 9=máximo

# ═══════════════════════════════════════════════════════════════════════════════
# REQUEST BODY
# ═══════════════════════════════════════════════════════════════════════════════

SecRequestBodyAccess On
SecRequestBodyLimit 13107200  # 12.5 MB
SecRequestBodyNoFilesLimit 131072  # 128 KB
SecRequestBodyLimitAction Reject

# ═══════════════════════════════════════════════════════════════════════════════
# RESPONSE BODY
# ═══════════════════════════════════════════════════════════════════════════════

SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecResponseBodyLimit 524288  # 512 KB
SecResponseBodyLimitAction ProcessPartial

# ═══════════════════════════════════════════════════════════════════════════════
# FILE UPLOAD
# ═══════════════════════════════════════════════════════════════════════════════

SecTmpDir /tmp/
SecDataDir /tmp/

# ═══════════════════════════════════════════════════════════════════════════════
# MISC
# ═══════════════════════════════════════════════════════════════════════════════

SecArgumentSeparator &
SecCookieFormat 0
SecUnicodeMapFile /usr/share/modsecurity-crs/unicode.mapping 20127

# ═══════════════════════════════════════════════════════════════════════════════
# OWASP CORE RULE SET (CRS)
# ═══════════════════════════════════════════════════════════════════════════════

# Incluir configuração do CRS
Include /usr/share/modsecurity-crs/crs-setup.conf

# Incluir regras do CRS
Include /usr/share/modsecurity-crs/rules/*.conf

# ═══════════════════════════════════════════════════════════════════════════════
# REGRAS CUSTOMIZADAS - Alya Specific
# ═══════════════════════════════════════════════════════════════════════════════

# Whitelist para falsos positivos conhecidos
SecRule REQUEST_URI "@beginsWith /api/clients" \
    "id:1001,phase:1,pass,nolog,ctl:ruleRemoveById=920420"

# Bloquear tentativas de SQL Injection explícitas
SecRule ARGS "@detectSQLi" \
    "id:2001,phase:2,block,log,msg:'SQL Injection detected',severity:CRITICAL,tag:'attack-sqli'"

# Bloquear tentativas de XSS explícitas
SecRule ARGS "@detectXSS" \
    "id:2002,phase:2,block,log,msg:'XSS detected',severity:CRITICAL,tag:'attack-xss'"

# Bloquear Path Traversal
SecRule REQUEST_URI|ARGS "@contains ../" \
    "id:2003,phase:1,block,log,msg:'Path Traversal detected',severity:HIGH"

SecRule REQUEST_URI|ARGS "@contains ..\" \
    "id:2004,phase:1,block,log,msg:'Path Traversal detected (Windows)',severity:HIGH"

# Bloquear acesso a arquivos sensíveis
SecRule REQUEST_URI "@rx \.(?:env|git|svn|htaccess|htpasswd)$" \
    "id:2005,phase:1,block,log,msg:'Access to sensitive file blocked',severity:CRITICAL"

# Rate limiting por IP (complementar ao Nginx)
# SecAction "id:2006,phase:1,initcol:ip=%{REMOTE_ADDR},setvar:ip.requests_per_min=+1,expirevar:ip.requests_per_min=60"
# SecRule IP:REQUESTS_PER_MIN "@gt 300" "id:2007,phase:1,block,log,msg:'Rate limit exceeded: %{IP.REQUESTS_PER_MIN} requests/min'"

# ═══════════════════════════════════════════════════════════════════════════════
# GEO BLOCKING (Opcional)
# ═══════════════════════════════════════════════════════════════════════════════

# Bloquear países específicos (exemplo)
# SecGeoLookupDB /usr/share/GeoIP/GeoIP.dat
# SecRule REMOTE_ADDR "@geoLookup" "chain,id:2100,phase:1,block,msg:'Blocked country'"
# SecRule GEO:COUNTRY_CODE "@streq CN" "setvar:tx.score=+10"
# SecRule GEO:COUNTRY_CODE "@streq RU" "setvar:tx.score=+10"

# ═══════════════════════════════════════════════════════════════════════════════
# ANOMALY SCORING
# ═══════════════════════════════════════════════════════════════════════════════

# Threshold de anomalia (quanto menor, mais rigoroso)
SecAction \
    "id:900000,\
    phase:1,\
    nolog,\
    pass,\
    setvar:tx.inbound_anomaly_score_threshold=5,\
    setvar:tx.outbound_anomaly_score_threshold=4"

# Paranoia Level (1-4, quanto maior mais rigoroso)
# Level 1: Recomendado para produção (poucos falsos positivos)
# Level 2: Moderado
# Level 3: Alto (mais falsos positivos)
# Level 4: Paranóico (muitos falsos positivos)
SecAction \
    "id:900001,\
    phase:1,\
    nolog,\
    pass,\
    setvar:tx.paranoia_level=1"

# ═══════════════════════════════════════════════════════════════════════════════
# EXCEÇÕES (Whitelist)
# ═══════════════════════════════════════════════════════════════════════════════

# Desabilitar regras específicas que causam falsos positivos
# (Ajuste conforme necessário após análise de logs)

# Exemplo: Permitir JSON com caracteres especiais no body
# SecRule REQUEST_HEADERS:Content-Type "@contains application/json" \
#     "id:3001,phase:1,pass,nolog,ctl:ruleRemoveById=920420"

# ═══════════════════════════════════════════════════════════════════════════════
# CUSTOM ERROR PAGES
# ═══════════════════════════════════════════════════════════════════════════════

# Página customizada para bloqueios
# SecDefaultAction "phase:2,deny,status:403,log,auditlog"

