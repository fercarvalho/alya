<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f59e0b" />
    <title>Sem conexão · Alya</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      body {
        display: flex; align-items: center; justify-content: center;
        background: linear-gradient(135deg, #78350f 0%, #f59e0b 100%);
        color: #fffbeb;
        padding: 1.5rem;
      }
      .card {
        max-width: 28rem; width: 100%;
        background: rgba(120, 53, 15, 0.55);
        border: 1px solid rgba(251, 191, 36, 0.3);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-radius: 16px;
        padding: 2rem 1.75rem;
        text-align: center;
      }
      .icon {
        width: 64px; height: 64px; margin: 0 auto 1rem;
        border-radius: 16px; background: #f59e0b;
        display: flex; align-items: center; justify-content: center;
        font-size: 32px;
      }
      h1 { margin: 0 0 .5rem; font-size: 1.5rem; font-weight: 600; }
      p  { margin: 0 0 1.25rem; color: #fef3c7; line-height: 1.5; }
      button {
        appearance: none; border: 0; cursor: pointer;
        background: #fffbeb; color: #78350f;
        padding: .75rem 1.25rem; border-radius: 9999px;
        font-weight: 600; font-size: .95rem;
      }
      button:hover { background: #fff; }
      .hint { margin-top: 1rem; font-size: .8rem; color: #fde68a; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon" aria-hidden="true">⚡</div>
      <h1>Você está offline</h1>
      <p>O Alya precisa de conexão pra carregar seus dados. Verifique sua internet e tente novamente.</p>
      <button onclick="location.reload()">Tentar novamente</button>
      <div class="hint" id="status">Aguardando conexão…</div>
    </div>
    <script>
      (function () {
        var st = document.getElementById('status');
        function update() {
          if (navigator.onLine) {
            st.textContent = 'Conexão detectada — recarregando…';
            setTimeout(function () { location.reload(); }, 400);
          } else {
            st.textContent = 'Aguardando conexão…';
          }
        }
        window.addEventListener('online', update);
        window.addEventListener('offline', update);
        update();
      })();
    </script>
  </body>
</html>
